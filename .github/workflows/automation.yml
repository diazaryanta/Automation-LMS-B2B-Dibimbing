name: Automation Regression Suite

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run API Tests
        run: ./gradlew test --tests "API.tests.*"
        continue-on-error: true

      - name: Run UI Tests
        run: ./gradlew test --tests "UI.tests.*"
        continue-on-error: true

      - name: Upload All Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Extent-Reports-Full
          path: reports/
          retention-days: 7

      - name: Send Detailed Slack Notification
        uses: rtCamp/action-slack-notify@v2
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USERNAME: "QA Automation Bot"
          SLACK_ICON_EMOJI: ":test_tube:"
          SLACK_COLOR: ${{ job.status }}
          SLACK_TITLE: "Regression Test Results"
          SLACK_MESSAGE: |
            *Laporan Pengujian Otomatis:*
            • *API Report:* Selesai dijalankan.
            • *UI Report:* Selesai dijalankan.
            
            Silakan cek tab *Actions* di GitHub untuk download laporan lengkap.
          SLACK_FOOTER: "LMS B2B Dibimbing - Continuous Integration"