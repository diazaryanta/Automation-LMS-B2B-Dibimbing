name: Automation Regression Suite

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Step 1: Jalankan API Test
      - name: Run API Tests
        run: ./gradlew test --tests "API.tests.*"
        continue-on-error: true

      # Step 2: Jalankan UI Test (Pastikan headless mode aktif di driver kamu)
      - name: Run UI Tests
        run: ./gradlew test --tests "UI.tests.*"
        continue-on-error: true

      # Step 3: Simpan Semua Report
      - name: Upload All Reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: Extent-Reports-Full
          path: reports/
          retention-days: 7

      # Step 4: Kirim Notifikasi Terpisah ke Slack
      - name: Send Detailed Slack Notification
        uses: rtCamp/action-slack-notify@v2
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USERNAME: "QA Automation Bot"
          SLACK_ICON_EMOJI: ":test_tube:"
          SLACK_COLOR: ${{ job.status }}
          SLACK_TITLE: "Regression Test Results"
          SLACK_MESSAGE: |
            *Laporan Pengujian Otomatis:*
            • *API Report:* Berhasil di-generate (Cek folder reports/API_Report.html)
            • *UI Report:* Berhasil di-generate (Cek folder reports/UI_Report.html)
            
            Silakan cek tab *Actions* di GitHub untuk download file laporan lengkap.
          SLACK_FOOTER: "LMS B2B Dibimbing - Continuous Integration"